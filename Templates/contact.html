<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshay Soni | Contact</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<nav>
    <div class="nav-container">
        <a href="{{ url_for('home') }}" class="logo">Akshay Soni</a>
        <div class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('projects') }}">Projects</a>
            <a href="{{ url_for('contact') }}" class="active">Contact</a>
        </div>
    </div>
</nav>

<main>
    <div class="contact-page">
        <div class="contact-header">
            <h1><i class="fas fa-paper-plane"></i> Get in Touch</h1>
            <p>I'd love to hear from you! Whether you have a question or just want to say hi, feel free to reach out.</p>
        </div>

        <form method="POST" action="{{ url_for('contact') }}" class="contact-form">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" rows="5" placeholder="Tell me about your project or message..."></textarea>
            <button type="submit"><i class="fas fa-envelope"></i> Send Message</button>
        </form>

        <div class="contact-info">
            <div class="contact-info-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>Ontario, Canada</span>
            </div>
            <div class="contact-info-item">
                <i class="fas fa-envelope"></i>
                <span>akshay.soni@example.com</span>
            </div>
            <div class="contact-info-item">
                <i class="fab fa-github"></i>
                <span>github.com/soniaksca</span>
            </div>
            <div class="contact-info-item">
                <i class="fab fa-linkedin"></i>
                <span>linkedin.com/in/akshaysoni</span>
            </div>
        </div>
    </div>
</main>

<footer>
    <div class="footer-content">
        <p>© 2026 Akshay Soni | Built with <i class="fas fa-heart" style="color: #e25555;"></i> for innovation</p>
        <div class="social-links">
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
        </div>
    </div>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
